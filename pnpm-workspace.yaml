packages:
  - apps/*
  - packages/*
  - tools/*
  - apps/apps/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5.9.3
  valibot: ^1.4.2
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.4
overrides:
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"
minimumReleaseAgeExclude:
  - hono@4.12.30
allowBuilds:
  esbuild: set this to true or false
