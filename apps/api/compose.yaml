services:
  db:
    env_file:
      - .env
    container_name: crm_db
    image: postgres:18.1-alpine
    restart: always
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - crm_pg_data:/var/lib/postgresql/data
volumes:
  crm_pg_data:
